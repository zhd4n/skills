name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SKILLS: "youtrack laravel-inertia shadcn-vue-laravel"

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Validate skill metadata
        run: |
          for skill in $SKILLS; do
            python3 scripts/validate_skill.py "$skill"
          done

      - name: Ensure no macOS metadata files are tracked
        run: |
          tracked_ds_store="$(git ls-files | grep -E '(^|/)\.DS_Store$' || true)"
          if [ -n "$tracked_ds_store" ]; then
            echo "Remove tracked .DS_Store files before publishing:"
            printf '%s\n' "$tracked_ds_store"
            exit 1
          fi

      - name: Run unit tests
        run: python3 -m unittest tests.test_youtrack_api -v

      - name: Compile Python entrypoints
        run: python3 -m py_compile youtrack/scripts/youtrack_api.py scripts/validate_skill.py

      - name: Verify skill is discoverable
        run: npx --yes skills add . --list

      - name: Verify isolated Codex install
        run: |
          export HOME="$RUNNER_TEMP/skills-home"
          mkdir -p "$HOME"
          for agent in codex claude-code; do
            for skill in $SKILLS; do
              npx --yes skills add "$GITHUB_WORKSPACE" --skill "$skill" -g -a "$agent" -y --copy
            done
          done
